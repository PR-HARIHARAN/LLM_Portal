<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with MySQL DB</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e293b, #374151);
            color: #f1f5f9;
            display: flex;
            min-height: 100vh;
            position: relative; /* Ensure the toggle button is always visible */
        }

        /* Sidebar Styling */
        .sidebar {
            height: 100%;
            width: 0;
            background: #1f2937;
            position: fixed;
            top: 0;
            left: 0;
            overflow-x: hidden;
            transition: width 0.3s ease-in-out;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.3);
            padding-top: 60px;
            display: flex;
            flex-direction: column; /* Stack items vertically */
        }

        .sidebar.open {
            width: 200px;
        }

        .sidebar button {
            background: #4f46e5;
            border: none;
            color: #f8fafc;
            text-align: center;
            padding: 1rem;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .sidebar button:hover {
            background: #9333ea;
            transform: scale(1.05);
        }

        .toggle-btn {
            position: fixed;
            top: 5px;
            left: 20px;
            background: #9333ea;
            color: #fff;
            border: none;
            border-radius: 50%;
            height: 50px;
            width: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(147, 51, 234, 0.5);
        }

        /* Content Styling */
        .content {
            margin-left: 0;
            padding: 1rem;
            width: 100%;
            transition: margin-left 0.3s ease-in-out;
        }

        .sidebar.open ~ .content {
            margin-left: 200px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            text-align: center;
            color: #f8fafc;
        }

        form {
            background: #1f2937;
            border: 2px solid #4b5563;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            margin: auto;
        }

        label {
            display: block;
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        input[type="text"], input[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border: none;
            font-size: 1rem;
        }

        input[type="text"] {
            background: #334155;
            color: #e2e8f0;
        }

        input[type="text"]::placeholder {
            color: #94a3b8;
        }

        input[type="submit"] {
            background: linear-gradient(90deg, #4f46e5, #9333ea);
            color: #f8fafc;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        input[type="submit"]:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(147, 51, 234, 0.4);
        }

        /* Add these new styles */
        .response-container {
            background: #1f2937;
            border: 2px solid #4b5563;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .response-container h2 {
            color: #cbd5e1;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .response-container p {
            color: #e2e8f0;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Add some gap between toggle button and sidebar content */
        .toggle-btn {
            margin-bottom: 20px; /* Added margin to create a gap between the toggle and the sidebar content */
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button onclick="window.location.href='/completion_status'">Completion Criteria Table</button>
        <button onclick="window.location.href='/logout'">Logout</button>
    </div>

    <!-- Toggle Button -->
    <button class="toggle-btn" onclick="toggleSidebar()">&#9776;</button>

    <!-- Content -->
    <div class="content">
        <h1>Chat with MySQL Database</h1>
        <form method="POST">
            <label for="question">Ask a question about the database:</label>
            <input type="text" id="question" name="question" placeholder="Type your question here..." required>
            <input type="submit" value="Submit">
        </form>
        
        <!-- Add this new section for displaying the response -->
        {% if response %}
        <div class="response-container">
            <h2>Response:</h2>
            <p>{{ response }}</p>
        </div>
        {% endif %}
    </div>

    <script>
        // JavaScript for toggling the sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }
    </script>
</body>
</html>
